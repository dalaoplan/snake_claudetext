<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --grid: #1f2937;
      --snake: #22c55e;
      --food: #ef4444;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --btn: #2563eb;
      --btn-hover: #1d4ed8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 20% 10%, #1e293b 0%, var(--bg) 40%, #020617 100%);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
    }

    .container {
      width: min(92vw, 640px);
      background: color-mix(in srgb, var(--panel) 92%, black 8%);
      border: 1px solid #334155;
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 16px 40px rgba(0, 0, 0, 0.35);
    }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .title {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .stats {
      display: flex;
      gap: 10px;
      color: var(--muted);
      font-size: 14px;
    }

    .badge {
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid #334155;
      background: #0b1220;
      color: var(--text);
    }

    canvas {
      width: 100%;
      max-width: 608px;
      aspect-ratio: 1 / 1;
      border-radius: 10px;
      border: 1px solid #334155;
      display: block;
      background: #0b1220;
      image-rendering: pixelated;
    }

    .controls {
      margin-top: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hint {
      font-size: 13px;
      color: var(--muted);
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 14px;
      background: var(--btn);
      color: white;
      font-weight: 600;
      cursor: pointer;
    }

    button:hover { background: var(--btn-hover); }
  </style>
</head>
<body>
  <main class="container">
    <div class="top">
      <div class="title">贪吃蛇</div>
      <div class="stats">
        <span class="badge">分数：<strong id="score">0</strong></span>
        <span class="badge">最高：<strong id="best">0</strong></span>
      </div>
    </div>

    <canvas id="game" width="608" height="608" aria-label="Snake game"></canvas>

    <div class="controls">
      <div class="hint">方向键 / WASD 控制，空格暂停，撞墙或撞到自己则结束。</div>
      <button id="restart">重新开始</button>
    </div>
  </main>

  <script>
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const bestEl = document.getElementById('best');
    const restartBtn = document.getElementById('restart');

    const gridCount = 19;
    const cell = canvas.width / gridCount;

    const bestKey = 'snake_best_score';
    let best = Number(localStorage.getItem(bestKey) || 0);
    bestEl.textContent = best;

    let snake, dir, nextDir, food, score, gameOver, paused, speedMs, loopTimer;

    function reset() {
      snake = [{ x: 9, y: 9 }];
      dir = { x: 1, y: 0 };
      nextDir = { x: 1, y: 0 };
      score = 0;
      gameOver = false;
      paused = false;
      speedMs = 140;
      scoreEl.textContent = score;
      spawnFood();
      clearInterval(loopTimer);
      loopTimer = setInterval(tick, speedMs);
      draw();
    }

    function spawnFood() {
      while (true) {
        const p = {
          x: Math.floor(Math.random() * gridCount),
          y: Math.floor(Math.random() * gridCount)
        };
        if (!snake.some(s => s.x === p.x && s.y === p.y)) {
          food = p;
          return;
        }
      }
    }

    function setDirection(nx, ny) {
      if (nx === -dir.x && ny === -dir.y) return;
      nextDir = { x: nx, y: ny };
    }

    function tick() {
      if (gameOver || paused) {
        draw();
        return;
      }

      dir = nextDir;
      const head = snake[0];
      const newHead = { x: head.x + dir.x, y: head.y + dir.y };

      if (
        newHead.x < 0 || newHead.x >= gridCount ||
        newHead.y < 0 || newHead.y >= gridCount ||
        snake.some(s => s.x === newHead.x && s.y === newHead.y)
      ) {
        gameOver = true;
        draw();
        return;
      }

      snake.unshift(newHead);

      if (newHead.x === food.x && newHead.y === food.y) {
        score += 1;
        scoreEl.textContent = score;
        if (score > best) {
          best = score;
          bestEl.textContent = best;
          localStorage.setItem(bestKey, String(best));
        }
        if (speedMs > 70 && score % 4 === 0) {
          speedMs -= 8;
          clearInterval(loopTimer);
          loopTimer = setInterval(tick, speedMs);
        }
        spawnFood();
      } else {
        snake.pop();
      }

      draw();
    }

    function drawGrid() {
      ctx.strokeStyle = '#1f2937';
      ctx.lineWidth = 1;
      for (let i = 0; i <= gridCount; i++) {
        const p = i * cell;
        ctx.beginPath();
        ctx.moveTo(p, 0);
        ctx.lineTo(p, canvas.height);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(0, p);
        ctx.lineTo(canvas.width, p);
        ctx.stroke();
      }
    }

    function drawCell(x, y, color, radius = 6) {
      const px = x * cell;
      const py = y * cell;
      const pad = 2;
      const w = cell - pad * 2;
      const h = cell - pad * 2;

      ctx.fillStyle = color;
      ctx.beginPath();
      const r = Math.min(radius, w / 2, h / 2);
      ctx.moveTo(px + pad + r, py + pad);
      ctx.arcTo(px + pad + w, py + pad, px + pad + w, py + pad + h, r);
      ctx.arcTo(px + pad + w, py + pad + h, px + pad, py + pad + h, r);
      ctx.arcTo(px + pad, py + pad + h, px + pad, py + pad, r);
      ctx.arcTo(px + pad, py + pad, px + pad + w, py + pad, r);
      ctx.closePath();
      ctx.fill();
    }

    function drawOverlay(text, subText) {
      ctx.fillStyle = 'rgba(2, 6, 23, 0.65)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = '#e2e8f0';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 42px system-ui';
      ctx.fillText(text, canvas.width / 2, canvas.height / 2 - 18);

      ctx.fillStyle = '#94a3b8';
      ctx.font = '16px system-ui';
      ctx.fillText(subText, canvas.width / 2, canvas.height / 2 + 24);
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGrid();

      drawCell(food.x, food.y, '#ef4444', 10);

      snake.forEach((part, idx) => {
        drawCell(part.x, part.y, idx === 0 ? '#4ade80' : '#22c55e', idx === 0 ? 8 : 6);
      });

      if (paused && !gameOver) {
        drawOverlay('暂停中', '按空格继续');
      } else if (gameOver) {
        drawOverlay('游戏结束', '按重新开始再来一局');
      }
    }

    window.addEventListener('keydown', (e) => {
      const k = e.key.toLowerCase();
      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " ", "w", "a", "s", "d"].includes(e.key) || ["w", "a", "s", "d"].includes(k)) {
        e.preventDefault();
      }

      if (k === 'w' || e.key === 'ArrowUp') setDirection(0, -1);
      if (k === 's' || e.key === 'ArrowDown') setDirection(0, 1);
      if (k === 'a' || e.key === 'ArrowLeft') setDirection(-1, 0);
      if (k === 'd' || e.key === 'ArrowRight') setDirection(1, 0);
      if (e.key === ' ') {
        if (!gameOver) {
          paused = !paused;
          draw();
        }
      }
    }, { passive: false });

    restartBtn.addEventListener('click', reset);

    reset();
  </script>
</body>
</html>
